build_platform:
  linux_ppc64le: linux_64
  linux_aarch64: linux_64
  win_64: linux_64
  osx_arm64: osx_64
test: native_and_emulated
conda_forge_output_validation: true
github:
  branch_name: main
  tooling_branch_name: main
conda_build:
  pkg_format: '2'
conda_build_tool: rattler-build
remote_ci_setup:
  - "rattler-build<0.62.0"
  - conda-build
  - conda-forge-ci-setup
azure:
  free_disk_space: true
provider:
  osx_64: azure
  osx_arm64: azure
  linux_64: azure
  linux_aarch64: azure
  linux_ppc64le: azure
  win_64: azure
